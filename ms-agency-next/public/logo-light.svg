<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@900&amp;family=DM+Sans:wght@300;400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#FFFFFF"/>

  <!-- Speed lines (left of 48h) -->
  <line x1="8"  y1="148" x2="60" y2="148" stroke="#0F2044" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="22" y1="170" x2="60" y2="170" stroke="#0F2044" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="36" y1="192" x2="60" y2="192" stroke="#0F2044" stroke-width="5.5" stroke-linecap="round"/>

  <!-- "48h" main headline -->
  <text x="64" y="268"
        font-family="'Syne', 'Arial Black', Impact, sans-serif"
        font-weight="900"
        font-size="188"
        fill="#0F2044"
        letter-spacing="-6">48h</text>

  <!-- Speedometer arc
       Center: (422, 145) — upper right overlapping the "h"
       Radius: 75
       From 11 o'clock to 3 o'clock (clockwise, small arc ~120°)
       11 o'clock (standard 120°): x=422+75*cos(120°)=422-37.5=384.5, y=145-75*sin(120°)=145-65=80
       3  o'clock (standard   0°): x=422+75=497, y=145
  -->
  <path d="M 384,80 A 75,75 0 0,1 497,145"
        stroke="#3B82F6" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Needle at ~1 o'clock (standard 60°): x=422+75*cos60=422+37.5=459, y=145-75*sin60=145-65=80 -->
  <line x1="422" y1="145" x2="456" y2="82"
        stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
  <!-- Pivot dot -->
  <circle cx="422" cy="145" r="5" fill="#3B82F6"/>
  <!-- Tip dot -->
  <circle cx="456" cy="82" r="4" fill="none" stroke="#3B82F6" stroke-width="2.5"/>

  <!-- AGENCY -->
  <text x="250" y="334"
        font-family="'DM Sans', Arial, sans-serif"
        font-weight="400"
        font-size="36"
        letter-spacing="16"
        fill="#0F2044"
        text-anchor="middle">AGENCY</text>

  <!-- Divider -->
  <line x1="108" y1="350" x2="392" y2="350"
        stroke="#0F2044" stroke-width="1.5" opacity="0.18"/>

  <!-- Tagline -->
  <text x="250" y="392"
        font-family="'DM Sans', Arial, sans-serif"
        font-size="13.5"
        letter-spacing="3"
        text-anchor="middle">
    <tspan fill="#0F2044" font-weight="300" opacity="0.5">SITES WEB, LIVRÉS EN </tspan><tspan fill="#3B82F6" font-weight="700">48H</tspan>
  </text>
</svg>
