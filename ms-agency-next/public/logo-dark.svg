<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@900&amp;family=DM+Sans:wght@300;400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#060E1C"/>

  <!-- "48h" main headline — white, imposant -->
  <text x="64" y="268"
        font-family="'Syne', 'Arial Black', Impact, sans-serif"
        font-weight="900"
        font-size="188"
        fill="#FFFFFF"
        letter-spacing="-6">48h</text>

  <!-- Speedometer arc — navy/dark, discret -->
  <path d="M 384,80 A 75,75 0 0,1 497,145"
        stroke="#1E3A6E" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Needle — slightly more visible -->
  <line x1="422" y1="145" x2="456" y2="82"
        stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="422" cy="145" r="4.5" fill="#1E3A6E"/>
  <circle cx="456" cy="82" r="3.5" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.7"/>

  <!-- AGENCY -->
  <text x="250" y="334"
        font-family="'DM Sans', Arial, sans-serif"
        font-weight="700"
        font-size="36"
        letter-spacing="16"
        fill="#FFFFFF"
        text-anchor="middle">AGENCY</text>

  <!-- Divider -->
  <line x1="108" y1="350" x2="392" y2="350"
        stroke="#FFFFFF" stroke-width="1" opacity="0.12"/>

  <!-- Tagline -->
  <text x="250" y="392"
        font-family="'DM Sans', Arial, sans-serif"
        font-size="13"
        letter-spacing="3"
        text-anchor="middle">
    <tspan fill="#FFFFFF" font-weight="300" opacity="0.4">SITES WEB, LIVRÉS EN </tspan><tspan fill="#3B82F6" font-weight="700">48H</tspan>
  </text>
</svg>
